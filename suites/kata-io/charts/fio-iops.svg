    <g stroke="#8250df"><path class="range" d="M484 559H505"/><path class="cap" d="M484 554V564M505 554V564"/></g><circle class="dot" cx="497" cy="559" r="6" fill="#8250df"/>
    <g stroke="#d55e00"><path class="range" d="M628 580H640"/><path class="cap" d="M628 575V585M640 575V585"/></g><circle class="dot" cx="632" cy="580" r="6" fill="#d55e00"/>
