{{- $profiles := list (dict "name" "seqread" "short" "sr") (dict "name" "fsync-heavy" "short" "fs") -}}
{{- $runtimes := list (dict "name" "standard" "short" "std") (dict "name" "kata" "short" "kata") -}}
jobs:
- name: kio-clean-jobs
  jobType: delete
  namespace: kata-io
  namespacedIterations: false
  skipIndexing: true
  preLoadImages: false
  qps: 20
  burst: 20
  objects:
  - kind: Job
    apiVersion: batch/v1
    labelSelector:
      app: kata-io
      benchmark: io
- name: kio-clean-pods
  jobType: delete
  namespace: kata-io
  namespacedIterations: false
  skipIndexing: true
  preLoadImages: false
  qps: 20
  burst: 20
  objects:
  - kind: Pod
    apiVersion: v1
    labelSelector:
      app: kata-io
      benchmark: io
- name: kio-clean-work-pvcs
  jobType: delete
  namespace: kata-io
  namespacedIterations: false
  skipIndexing: true
  preLoadImages: false
  qps: 20
  burst: 20
  objects:
  - kind: PersistentVolumeClaim
    apiVersion: v1
    labelSelector:
      app: kata-io
      benchmark: io
      pvc-role: work
- name: kio-preload-images
  jobType: create
  namespace: kata-io
  namespacedIterations: false
  jobIterations: 1
  qps: 1
  burst: 1
  cleanup: true
  waitWhenFinished: true
  maxWaitTimeout: 10m
  preLoadImages: true
  skipIndexing: true
  objects:
  - objectTemplate: templates/preload-pod.yml
    replicas: 1
    inputVars:
      jobName: '{{.k8sRunID}}-preload-workload'
  - objectTemplate: templates/preload-patch-pod.yml
    replicas: 1
    inputVars:
      jobName: '{{.k8sRunID}}-preload-patchpool'
{{ range $profile := $profiles -}}
{{ range $runtime := $runtimes }}
- name: kio-fast-disk-{{ $profile.name }}-{{ $runtime.name }}
  jobType: create
  namespace: kata-io
  namespacedIterations: false
  jobIterations: 1
  qps: 1
  burst: 1
  cleanup: true
  waitWhenFinished: true
  maxWaitTimeout: 6m
  preLoadImages: false
  objects:
  - objectTemplate: templates/work-pvc.yml
    replicas: 1
    inputVars:
      jobName: '{{ $.k8sRunID }}-fd-{{ $profile.short }}-{{ $runtime.short }}'
      storageType: storage-azure-disk
      workStorageClass: managed-csi
      workAccessMode: ReadWriteOnce
  - objectTemplate: templates/fio-pvc-{{ $runtime.name }}-job.yml
    replicas: 1
    inputVars:
      jobName: '{{ $.k8sRunID }}-fd-{{ $profile.short }}-{{ $runtime.short }}'
      scenario: runtime-{{ $runtime.name }}-storage-azure-disk-fio-{{ $profile.name }}-concurrency-1
      runtime: runtime-{{ $runtime.name }}
      storageType: storage-azure-disk
      workloadType: fio
      fioProfile: /profiles/{{ $profile.name }}.fio
      fioProfileName: {{ $profile.name }}
      concurrency: '1'
{{ end }}
- name: kio-fast-block-{{ $profile.name }}-kata-patched
  jobType: create
  namespace: kata-io
  namespacedIterations: false
  jobIterations: 1
  qps: 1
  burst: 1
  cleanup: true
  waitWhenFinished: true
  maxWaitTimeout: 6m
  preLoadImages: false
  objects:
  - objectTemplate: templates/work-block-pvc.yml
    replicas: 1
    inputVars:
      jobName: '{{ $.k8sRunID }}-blk-{{ $profile.short }}-kp'
      storageType: storage-azure-disk-block
      workStorageClass: managed-csi
  - objectTemplate: templates/fio-block-kata-job.yml
    replicas: 1
    inputVars:
      jobName: '{{ $.k8sRunID }}-blk-{{ $profile.short }}-kp'
      scenario: runtime-kata-patched-storage-azure-disk-block-fio-{{ $profile.name }}-concurrency-1
      runtime: runtime-kata-patched
      storageType: storage-azure-disk-block
      workloadType: fio
      fioProfile: /profiles/{{ $profile.name }}.fio
      fioProfileName: {{ $profile.name }}
      concurrency: '1'
{{ end -}}
