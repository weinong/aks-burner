apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{.jobName}}-{{.Iteration}}
  namespace: {{.namespace}}
  labels:
    app: kata-io
    benchmark: io
    pvc-role: work
    storage-type: {{.storageType}}
spec:
  volumeMode: Block
  accessModes:
    - ReadWriteOnce
  storageClassName: {{.workStorageClass}}
  resources:
    requests:
      storage: {{.workVolumeSize}}
