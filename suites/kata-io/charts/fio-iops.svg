    <g stroke="#9a6700"><path class="range" d="M382 714H443"/><path class="cap" d="M382 709V719M443 709V719"/></g><circle class="dot" cx="412" cy="714" r="6" fill="#9a6700"/>
    <g stroke="#8250df"><path class="range" d="M427 735H433"/><path class="cap" d="M427 730V740M433 730V740"/></g><circle class="dot" cx="428" cy="735" r="6" fill="#8250df"/>
    <g stroke="#d55e00"><path class="range" d="M427 756H441"/><path class="cap" d="M427 751V761M441 751V761"/></g><circle class="dot" cx="437" cy="756" r="6" fill="#d55e00"/>
    <g stroke="#009e73"><path class="range" d="M419 777H443"/><path class="cap" d="M419 772V782M443 772V782"/></g><circle class="dot" cx="433" cy="777" r="6" fill="#009e73"/>
  </g>

  <g id="fsync-heavy">
    <rect class="panel" x="40" y="824" width="920" height="164" rx="6"/>
    <text class="profile" x="55" y="849">fsync-heavy</text>
    <g class="grid"><path d="M300 858V974 M428 858V974 M556 858V974 M684 858V974 M812 858V974 M940 858V974"/></g>
    <g class="axis"><text x="292" y="983">10</text><text x="416" y="983">100</text><text x="546" y="983">1k</text><text x="671" y="983">10k</text><text x="796" y="983">100k</text><text x="927" y="983">1m</text></g>
    <g class="label"><text x="55" y="873">Default / emptyDir</text><text x="55" y="894">Kata / emptyDir</text><text x="55" y="915">Default / Disk FS</text><text x="55" y="936">Kata / Disk FS</text><text x="55" y="957">Patched Kata / Disk raw block</text></g>
