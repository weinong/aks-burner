apiVersion: v1
kind: Pod
metadata:
  name: kata-perf-oci-{{.Iteration}}-{{.Replica}}
  labels:
    app: kata-perf
spec:
  nodeSelector:
    perf.azure.com/node-role: workload
    kubernetes.azure.com/os-sku: AzureLinux
  restartPolicy: Never
  containers:
    - name: pause
      image: {{.image}}
      imagePullPolicy: IfNotPresent
