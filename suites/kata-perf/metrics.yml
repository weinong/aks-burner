- query: sum by (runtime_handler) (kubelet_run_podsandbox_duration_seconds_count{perf_azure_com_node_role="workload"})
  metricName: runPodSandboxCount
  instant: true
  captureStart: true
- query: sum by (runtime_handler) (kubelet_run_podsandbox_duration_seconds_sum{perf_azure_com_node_role="workload"})
  metricName: runPodSandboxSum
  instant: true
  captureStart: true
