jobs:
- name: kio-clean-jobs
  jobType: delete
  namespace: kata-io
  namespacedIterations: false
  skipIndexing: true
  preLoadImages: false
  qps: 20
  burst: 20
  objects:
  - kind: Job
    apiVersion: batch/v1
    labelSelector:
      app: kata-io
      benchmark: io
- name: kio-clean-pods
  jobType: delete
  namespace: kata-io
  namespacedIterations: false
  skipIndexing: true
  preLoadImages: false
  qps: 20
  burst: 20
  objects:
  - kind: Pod
    apiVersion: v1
    labelSelector:
      app: kata-io
      benchmark: io
- name: kio-clean-work-pvcs
  jobType: delete
  namespace: kata-io
  namespacedIterations: false
  skipIndexing: true
  preLoadImages: false
  qps: 20
  burst: 20
  objects:
  - kind: PersistentVolumeClaim
    apiVersion: v1
    labelSelector:
      app: kata-io
      benchmark: io
      pvc-role: work
- name: kio-preload-images
  jobType: create
  namespace: kata-io
  namespacedIterations: false
  jobIterations: 1
  qps: 1
  burst: 1
  cleanup: true
  waitWhenFinished: true
  maxWaitTimeout: 10m
  preLoadImages: true
  skipIndexing: true
  objects:
  - objectTemplate: templates/preload-pod.yml
    replicas: 1
    inputVars:
      jobName: '{{.k8sRunID}}-preload-workload'
      nodeRole: workload
  - objectTemplate: templates/preload-pod.yml
    replicas: 1
    inputVars:
      jobName: '{{.k8sRunID}}-preload-patchpool'
      nodeRole: patchpool
- name: kio-smoke-1
  jobType: create
  namespace: kata-io
  namespacedIterations: false
  jobIterations: 1
  qps: 1
  burst: 1
  cleanup: true
  waitWhenFinished: true
  preLoadImages: false
  objects:
  - objectTemplate: templates/fio-emptydir-standard-job.yml
    replicas: 1
    inputVars:
      jobName: '{{.k8sRunID}}-std-ed-fio-rr'
      scenario: runtime-standard-storage-emptydir-fio-randread-4k-concurrency-1
      runtime: runtime-standard
      storageType: storage-emptydir
      workloadType: fio
      fioProfile: /profiles/randread-4k.fio
      fioProfileName: randread-4k
      concurrency: '1'
- name: kio-smoke-2
  jobType: create
  namespace: kata-io
  namespacedIterations: false
  jobIterations: 1
  qps: 1
  burst: 1
  cleanup: true
  waitWhenFinished: true
  preLoadImages: false
  objects:
  - objectTemplate: templates/fio-emptydir-kata-job.yml
    replicas: 1
    inputVars:
      jobName: '{{.k8sRunID}}-kata-ed-fio-rr'
      scenario: runtime-kata-storage-emptydir-fio-randread-4k-concurrency-1
      runtime: runtime-kata
      storageType: storage-emptydir
      workloadType: fio
      fioProfile: /profiles/randread-4k.fio
      fioProfileName: randread-4k
      concurrency: '1'
