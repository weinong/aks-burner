name: kata-perf
description: Kata and default-runtime pod startup latency and offered-load comparison on AKS.
tests:
  - startup-smoke
  - startup-default-runtime
  - startup-load-kata
  - startup-load-default-runtime
  - storage-startup-kata-none
  - storage-startup-standard-none
  - storage-startup-kata-azure-disk
  - storage-startup-standard-azure-disk
  - storage-startup-kata-azure-files
  - storage-startup-standard-azure-files
modeDefaults:
  iterationsPerNamespace: 1
  qps: 5
  burst: 5
  cleanup: true
  waitWhenFinished: false
  preLoadImages: true
  jobPause: 1m
  metricsClosing: afterMeasurements
  reporting:
    scheme: kube-burner
  templateVars:
    app: kata-perf
  imageVars:
    image: pause
