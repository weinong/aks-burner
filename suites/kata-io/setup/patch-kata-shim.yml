apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: kata-shim-patch
  namespace: kube-system
  labels:
    app: kata-shim-patch
spec:
  selector:
    matchLabels:
      app: kata-shim-patch
  template:
    metadata:
      labels:
        app: kata-shim-patch
    spec:
      serviceAccountName: kata-shim-patch
      automountServiceAccountToken: false
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      nodeSelector:
        perf.azure.com/node-role: patchpool
      tolerations:
        - key: perf.azure.com/kata-shim-patch
          operator: Equal
          value: pending
          effect: NoSchedule
      initContainers:
        - name: patch
          image: curlimages/curl@sha256:4026b29997dc7c823b51c164b71e2b51e0fd95cce4601f78202c513d97da2922
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsUser: 0
            runAsGroup: 0
          command:
            - /bin/sh
            - -ec
            - |
              url="https://abombo.blob.core.windows.net/public/containerd-shim-kata-v2.bin"
              expected_size="66484264"
              expected_sha="d78b0c859c25f795dee201f8ae1b28c987fd6b0537efd0430b5fd6ad47a93ec1"
              target="/host-bin/containerd-shim-kata-v2"
              tmp="/host-bin/.containerd-shim-kata-v2.${HOSTNAME}.tmp"

              if [ ! -f "$target" ]; then
                echo "Kata shim target does not exist: $target" >&2
                exit 1
              fi
              target_mode="$(stat -c %a "$target")"
              target_uid="$(stat -c %u "$target")"
              target_gid="$(stat -c %g "$target")"

              if [ "$(sha256sum "$target" | awk '{print $1}')" != "$expected_sha" ]; then
                header_size="$(curl -fsSI "$url" | awk 'BEGIN{IGNORECASE=1} /^Content-Length:/ {gsub("\r", "", $2); print $2}' | tail -n 1)"
                if [ "$header_size" != "$expected_size" ]; then
                  echo "unexpected Content-Length: got ${header_size}, want ${expected_size}" >&2
                  exit 1
                fi

                rm -f "$tmp"
                curl -fsSL "$url" -o "$tmp"
                actual_size="$(wc -c < "$tmp" | tr -d ' ')"
                if [ "$actual_size" != "$expected_size" ]; then
                  echo "unexpected downloaded size: got ${actual_size}, want ${expected_size}" >&2
                  rm -f "$tmp"
                  exit 1
                fi
                actual_sha="$(sha256sum "$tmp" | awk '{print $1}')"
                if [ "$actual_sha" != "$expected_sha" ]; then
                  echo "unexpected downloaded sha256: got ${actual_sha}, want ${expected_sha}" >&2
                  rm -f "$tmp"
                  exit 1
                fi

                chown "$target_uid:$target_gid" "$tmp"
                chmod "$target_mode" "$tmp"
                mv -f "$tmp" "$target"
              else
                echo "Kata shim already patched"
              fi

              installed_sha="$(sha256sum "$target" | awk '{print $1}')"
              installed_mode="$(stat -c %a "$target")"
              installed_uid="$(stat -c %u "$target")"
              installed_gid="$(stat -c %g "$target")"
              if [ "$installed_sha" != "$expected_sha" ] || [ "$installed_mode" != "$target_mode" ] || [ "$installed_uid" != "$target_uid" ] || [ "$installed_gid" != "$target_gid" ]; then
                echo "installed shim verification failed: sha=$installed_sha mode=$installed_mode uid=$installed_uid gid=$installed_gid" >&2
                exit 1
              fi

              token="$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)"
              ca=/var/run/secrets/kubernetes.io/serviceaccount/ca.crt
              node_api="https://${KUBERNETES_SERVICE_HOST}:${KUBERNETES_SERVICE_PORT}/api/v1/nodes/${NODE_NAME}"
              node_json="$(curl -fsS --cacert "$ca" -H "Authorization: Bearer $token" "$node_api")"
              taint_removed=false
              taint_present=false
              if printf '%s' "$node_json" | grep -Eq '\{[^{}]*"key"[[:space:]]*:[[:space:]]*"perf.azure.com/kata-shim-patch"[^{}]*"value"[[:space:]]*:[[:space:]]*"pending"[^{}]*"effect"[[:space:]]*:[[:space:]]*"NoSchedule"[^{}]*\}'; then
                taint_present=true
                index=0
                while [ "$index" -lt 64 ]; do
                  patch="$(printf '[{"op":"test","path":"/spec/taints/%s","value":{"key":"perf.azure.com/kata-shim-patch","value":"pending","effect":"NoSchedule"}},{"op":"remove","path":"/spec/taints/%s"}]' "$index" "$index")"
                  if curl -fsS --cacert "$ca" \
                    -H "Authorization: Bearer $token" \
                    -H "Content-Type: application/json-patch+json" \
                    -X PATCH --data "$patch" "$node_api" >/dev/null 2>&1; then
                    taint_removed=true
                    break
                  fi
                  index=$((index + 1))
                done
                if [ "$taint_removed" != true ]; then
                  echo "exact pending shim-patch taint could not be removed from node $NODE_NAME" >&2
                  exit 1
                fi
              else
                echo "pending shim-patch taint already absent"
              fi
              echo "Kata shim patched successfully"
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          volumeMounts:
            - name: host-bin
              mountPath: /host-bin
            - name: service-account
              mountPath: /var/run/secrets/kubernetes.io/serviceaccount
              readOnly: true
      containers:
        - name: sleeper
          image: curlimages/curl@sha256:4026b29997dc7c823b51c164b71e2b51e0fd95cce4601f78202c513d97da2922
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          command:
            - /bin/sh
            - -c
            - sleep infinity
      volumes:
        - name: host-bin
          hostPath:
            path: /usr/local/bin
            type: Directory
        - name: service-account
          projected:
            sources:
              - serviceAccountToken:
                  path: token
                  expirationSeconds: 600
              - configMap:
                  name: kube-root-ca.crt
                  items:
                    - key: ca.crt
                      path: ca.crt
              - downwardAPI:
                  items:
                    - path: namespace
                      fieldRef:
                        fieldPath: metadata.namespace
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kata-shim-patch
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kata-shim-patch
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kata-shim-patch
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kata-shim-patch
subjects:
  - kind: ServiceAccount
    name: kata-shim-patch
    namespace: kube-system
