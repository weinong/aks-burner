name: kata-io
description: Exploratory AKS Kata Pod Sandboxing I/O and Git clone benchmark suite.
tests:
  - kata-io-fio-fast
  - kata-io-git-fast
  - kata-io-fio
  - kata-io-git
modeDefaults:
  iterations: 1
  iterationsPerNamespace: 1
  qps: 1
  burst: 1
  cleanup: false
  waitWhenFinished: true
  preLoadImages: false
  reporting:
    scheme: standard-summary
  templateVars:
    namespace: kata-io
    repoURL: https://github.com/kubernetes/kubernetes
    kataRuntimeClassName: kata-vm-isolation
    azureDiskStorageClass: managed-csi
    workVolumeSize: 128Gi
  imageVars:
    benchmarkImage: benchmark
setup:
  resources:
    - name: namespace
      path: setup/namespace.yml
      wait:
        - kind: exists
          resource: namespace/kata-io
          timeout: 1m
    - name: kata-shim-patch
      path: setup/patch-kata-shim.yml
      restart:
        resource: daemonset/kata-shim-patch
        namespace: kube-system
      wait:
        - kind: rollout
          resource: daemonset/kata-shim-patch
          namespace: kube-system
          timeout: 15m
    - name: results-pvc
      path: setup/results-pvc.yml
      wait:
        - kind: exists
          resource: pvc/kata-io-results
          namespace: kata-io
          timeout: 10m
