suite: kata-io
requires:
  infrastructure:
    provider: aks
    nodePools:
      - name: systempool
        mode: System
        count: 1
        vmSize: Standard_D4s_v5
        osType: Linux
        osSKU: Ubuntu
        workloadRuntime: OCIContainer
        labels: {}
        taints: []
      - name: userpool
        mode: User
        count: 4
        vmSize: Standard_D8s_v5
        osType: Linux
        osSKU: AzureLinux
        workloadRuntime: KataMshvVmIsolation
        labels:
          perf.azure.com/node-role: workload
        taints: []
      - name: patchpool
        mode: User
        count: 4
        vmSize: Standard_D8s_v5
        osType: Linux
        osSKU: AzureLinux
        workloadRuntime: KataMshvVmIsolation
        labels:
          perf.azure.com/node-role: patchpool
        taints: []
  kubernetes:
    minVersion: "1.36"
  nodeSelectors:
    - name: workload
      pool: userpool
      required: true
      minNodes: 1
      labels:
        perf.azure.com/node-role: workload
    - name: patched-kata
      pool: patchpool
      required: true
      minNodes: 4
      labels:
        perf.azure.com/node-role: patchpool
  images:
    builds:
      - key: benchmark
        repository: kata-io/benchmark
        context: images/benchmark
        dockerfile: Dockerfile
        platform: linux/amd64
        timeoutSeconds: 3600
  reporting:
    sources:
      standardSummary: true
      kubeBurner: false
    prometheusMetricUnits: {}
  observability:
    prometheus:
      required: false
      install: false
      namespace: perf-monitoring
      imageKey: prometheus
      serviceName: prometheus
      servicePort: 9090
      localPort: 9090
  artifacts:
    enabled: true
    namespace: kata-io
    pvcName: kata-io-results
    mountPath: /results
    copyImage: artifact-copy
