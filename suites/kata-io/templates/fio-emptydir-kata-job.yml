apiVersion: batch/v1
kind: Job
metadata:
  name: {{.jobName}}-{{.Iteration}}
  namespace: {{.namespace}}
  labels:
    app: kata-io
    benchmark: io
    runtime: {{.runtime}}
    storage-type: {{.storageType}}
    workload-type: fio
    profile: {{.fioProfileName}}
    concurrency: "{{.concurrency}}"
  annotations:
    scenario: {{.scenario}}
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app: kata-io
        benchmark: io
        runtime: {{.runtime}}
        storage-type: {{.storageType}}
        workload-type: fio
        profile: {{.fioProfileName}}
        concurrency: "{{.concurrency}}"
      annotations:
        scenario: {{.scenario}}
    spec:
      restartPolicy: Never
      runtimeClassName: {{.kataRuntimeClassName}}
      nodeSelector:
        perf.azure.com/node-role: workload
      containers:
        - name: fio
          image: {{.benchmarkImage}}
          imagePullPolicy: IfNotPresent
          command: [/usr/local/bin/run-fio.sh]
          env:
            - name: RUN_ID
              value: {{.runID}}
            - name: SCENARIO
              value: {{.scenario}}
            - name: SAMPLE_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: FIO_PROFILE
              value: {{.fioProfile}}
            - name: FIO_PROFILE_NAME
              value: {{.fioProfileName}}
            - name: WORK_DIR
              value: /work
            - name: RESULTS_DIR
              value: /results
          resources:
            requests:
              cpu: "2"
              memory: 8Gi
            limits:
              cpu: "2"
              memory: 8Gi
          volumeMounts:
            - name: work
              mountPath: /work
            - name: results
              mountPath: /results
      volumes:
        - name: work
          emptyDir:
            sizeLimit: {{.workVolumeSize}}
        - name: results
          persistentVolumeClaim:
            claimName: kata-io-results
