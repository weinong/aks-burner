<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="1050" viewBox="0 0 1000 1050" role="img" aria-labelledby="title desc">
  <title id="title">Fio concurrency-10 IOPS comparison</title>
  <desc id="desc">Five horizontal dot-and-whisker panels compare median IOPS and observed minimum to maximum for five runtime and storage paths. The horizontal scale is logarithmic and higher values are better.</desc>
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #24292f; }
    .title { font-size: 24px; font-weight: 600; }
    .subtitle, .axis, .legend { font-size: 13px; }
    .profile { font-size: 17px; font-weight: 600; }
    .label { font-size: 12px; }
    .grid { stroke: #d8dee4; stroke-width: 1; }
    .range { stroke-width: 3; stroke-linecap: round; }
    .cap { stroke-width: 1.5; }
    .dot { stroke: #ffffff; stroke-width: 1.5; }
    .panel { fill: #f6f8fa; }
  </style>
  <rect width="1000" height="1050" fill="#ffffff"/>
  <text class="title" x="40" y="42">Fio concurrency-10 IOPS</text>
  <text class="subtitle" x="40" y="66">Median dot with observed min-max range; logarithmic scale; higher is better</text>

  <g class="legend">
    <circle cx="55" cy="94" r="6" fill="#0072b2"/><text x="68" y="99">Default / emptyDir</text>
    <circle cx="225" cy="94" r="6" fill="#9a6700"/><text x="238" y="99">Kata / emptyDir</text>
    <circle cx="375" cy="94" r="6" fill="#8250df"/><text x="388" y="99">Default / Disk FS</text>
    <circle cx="545" cy="94" r="6" fill="#d55e00"/><text x="558" y="99">Kata / Disk FS</text>
    <circle cx="690" cy="94" r="6" fill="#009e73"/><text x="703" y="99">Patched Kata / Disk raw block</text>
  </g>

  <g id="randread">
    <rect class="panel" x="40" y="120" width="920" height="164" rx="6"/>
    <text class="profile" x="55" y="145">randread-4k</text>
    <g class="grid"><path d="M300 154V270 M428 154V270 M556 154V270 M684 154V270 M812 154V270 M940 154V270"/></g>
    <g class="axis"><text x="292" y="279">10</text><text x="416" y="279">100</text><text x="546" y="279">1k</text><text x="671" y="279">10k</text><text x="796" y="279">100k</text><text x="927" y="279">1m</text></g>
    <g class="label"><text x="55" y="169">Default / emptyDir</text><text x="55" y="190">Kata / emptyDir</text><text x="55" y="211">Default / Disk FS</text><text x="55" y="232">Kata / Disk FS</text><text x="55" y="253">Patched Kata / Disk raw block</text></g>
    <g stroke="#0072b2"><path class="range" d="M698 165H721"/><path class="cap" d="M698 160V170M721 160V170"/></g><circle class="dot" cx="699" cy="165" r="6" fill="#0072b2"/>
    <g stroke="#9a6700"><path class="range" d="M790 186H814"/><path class="cap" d="M790 181V191M814 181V191"/></g><circle class="dot" cx="804" cy="186" r="6" fill="#9a6700"/>
    <g stroke="#8250df"><path class="range" d="M705 207H736"/><path class="cap" d="M705 202V212M736 202V212"/></g><circle class="dot" cx="718" cy="207" r="6" fill="#8250df"/>
    <g stroke="#d55e00"><path class="range" d="M672 228H817"/><path class="cap" d="M672 223V233M817 223V233"/></g><circle class="dot" cx="707" cy="228" r="6" fill="#d55e00"/>
    <g stroke="#009e73"><path class="range" d="M858 249H866"/><path class="cap" d="M858 244V254M866 244V254"/></g><circle class="dot" cx="863" cy="249" r="6" fill="#009e73"/>
  </g>

  <g id="randwrite">
    <rect class="panel" x="40" y="296" width="920" height="164" rx="6"/>
    <text class="profile" x="55" y="321">randwrite-4k</text>
    <g class="grid"><path d="M300 330V446 M428 330V446 M556 330V446 M684 330V446 M812 330V446 M940 330V446"/></g>
