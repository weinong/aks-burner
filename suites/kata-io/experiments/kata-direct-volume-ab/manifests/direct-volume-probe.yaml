apiVersion: v1
kind: Pod
metadata:
  name: REPLACE_POD_NAME
  namespace: REPLACE_NAMESPACE
  labels:
    app.kubernetes.io/name: kata-direct-volume-ab
    kata-direct-volume-ab/run: REPLACE_RUN_LABEL
    kata-direct-volume-ab/case: REPLACE_CASE
spec:
  runtimeClassName: kata-vm-isolation
  nodeName: REPLACE_NODE
  restartPolicy: Never
  terminationGracePeriodSeconds: 5
  tolerations:
    - key: dedicated
      operator: Equal
      value: kata-direct-volume-ab
      effect: NoSchedule
  containers:
    - name: probe
      image: REPLACE_PROBE_IMAGE
      imagePullPolicy: IfNotPresent
      command: [/bin/bash, -ceu, "printf '%s' REPLACE_COMMAND_B64 | base64 -d | /bin/bash -seu"]
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          add: [SYS_ADMIN]
          drop: [ALL]
        runAsNonRoot: false
        runAsUser: 0
        seccompProfile:
          type: RuntimeDefault
      resources:
        requests: {cpu: "1", memory: 1Gi}
        limits: {cpu: "1", memory: 1Gi}
      volumeMounts:
        - name: workspace
          mountPath: /workspace
  volumes:
    - name: workspace
      hostPath:
        path: REPLACE_WORKSPACE
        type: Directory
