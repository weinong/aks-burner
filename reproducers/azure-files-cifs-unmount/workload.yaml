apiVersion: v1
kind: Namespace
metadata:
  name: cifs-unmount-repro
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: results
  namespace: cifs-unmount-repro
  labels:
    app: cifs-unmount-repro
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: azurefile-csi
  resources:
    requests:
      storage: 128Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: work-0
  namespace: cifs-unmount-repro
  labels:
    app: cifs-unmount-repro
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: azurefile-csi
  resources:
    requests:
      storage: 128Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: work-1
  namespace: cifs-unmount-repro
  labels:
    app: cifs-unmount-repro
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: azurefile-csi
  resources:
    requests:
      storage: 128Gi
---
apiVersion: batch/v1
kind: Job
metadata:
  name: fio-randread-0
  namespace: cifs-unmount-repro
  labels:
    app: cifs-unmount-repro
    runtime: runtime-standard
    storage-type: storage-azure-files
    profile: randread-4k
  annotations:
    scenario: runtime-standard-storage-azure-files-fio-randread-4k-targeted
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app: cifs-unmount-repro
        runtime: runtime-standard
        storage-type: storage-azure-files
        profile: randread-4k
    spec:
      restartPolicy: Never
      terminationGracePeriodSeconds: 30
      nodeSelector:
        repro.azure.com/target: cifs-unmount
      containers:
        - name: fio
          image: ubuntu:24.04@sha256:4fbb8e6a8395de5a7550b33509421a2bafbc0aab6c06ba2cef9ebffbc7092d90
          command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail
              apt-get update
              DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends fio
              mkdir -p /work/run
              fio --version | tee /results/fio-randread-0-version.txt
              touch /results/ready-0
              until [[ -e /results/ready-0 && -e /results/ready-1 ]]; do sleep 1; done
              fio \
                --name=randread-4k \
                --directory=/work/run \
                --ioengine=libaio \
                --direct=1 \
                --time_based=1 \
                --runtime=60 \
                --size=1G \
                --bs=4k \
                --iodepth=32 \
                --numjobs=4 \
                --group_reporting=1 \
                --rw=randread \
                --output-format=json \
                --output=/results/fio-randread-0.json
              cat /results/fio-randread-0.json
          resources:
            requests:
              cpu: "2"
              memory: 8Gi
            limits:
              cpu: "2"
              memory: 8Gi
          volumeMounts:
            - name: work
              mountPath: /work
            - name: results
              mountPath: /results
      volumes:
        - name: work
          persistentVolumeClaim:
            claimName: work-0
        - name: results
          persistentVolumeClaim:
            claimName: results
---
